# Arneb Benchmark & E2E Test Environment
#
# Provides:
#   - MinIO (S3-compatible object storage)
#   - Hive Metastore (standalone mode with embedded Derby)
#   - Trino (query engine for data generation and baseline benchmarks)
#   - TPC-H / TPC-DS seed services (Trino CTAS into Hive tables)
#
# Usage:
#   docker compose up -d                    # start MinIO + HMS + Trino
#   docker compose run tpch-seed            # seed TPC-H data (SF1)
#   docker compose run tpcds-seed           # seed TPC-DS data (SF1)
#   docker compose down -v                  # tear down (delete volumes)

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/warehouse --ignore-existing &&
      mc anonymous set download local/warehouse &&
      exit 0
      "

  hive-metastore:
    # Custom image: apache/hive:4.2.0 + hadoop-aws + aws-java-sdk-bundle.
    # See docker/hive-metastore/Dockerfile and metastore-site.xml.
    build: ./docker/hive-metastore
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/9083"]
      interval: 10s
      timeout: 5s
      retries: 10

  trino:
    image: trinodb/trino:latest
    ports:
      - "8080:8080"
    volumes:
      - ./docker/trino/catalog:/etc/trino/catalog
    depends_on:
      hive-metastore:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "trino", "--execute", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  tpch-seed:
    image: trinodb/trino:latest
    volumes:
      - ./docker/tpch-seed:/seed
    entrypoint: ["/bin/bash", "/seed/seed.sh"]
    environment:
      TPCH_SF: ${TPCH_SF:-sf1}
      TRINO_SERVER: trino:8080
    depends_on:
      trino:
        condition: service_healthy
    profiles:
      - tpch-seed

  tpcds-seed:
    image: trinodb/trino:latest
    volumes:
      - ./docker/tpcds-seed:/seed
    entrypoint: ["/bin/bash", "/seed/seed.sh"]
    environment:
      TPCDS_SF: ${TPCDS_SF:-sf1}
      TRINO_SERVER: trino:8080
    depends_on:
      trino:
        condition: service_healthy
    profiles:
      - tpcds-seed
