# TPC-H Benchmark Configuration for trino-alt
# Generated Parquet data should be in benchmarks/tpch/data/sf1/

bind_address = "127.0.0.1"
port = 5432

[[tables]]
name = "lineitem"
path = "benchmarks/tpch/data/sf1/lineitem.parquet"
format = "parquet"

[[tables]]
name = "orders"
path = "benchmarks/tpch/data/sf1/orders.parquet"
format = "parquet"

[[tables]]
name = "customer"
path = "benchmarks/tpch/data/sf1/customer.parquet"
format = "parquet"

[[tables]]
name = "part"
path = "benchmarks/tpch/data/sf1/part.parquet"
format = "parquet"

[[tables]]
name = "partsupp"
path = "benchmarks/tpch/data/sf1/partsupp.parquet"
format = "parquet"

[[tables]]
name = "supplier"
path = "benchmarks/tpch/data/sf1/supplier.parquet"
format = "parquet"

[[tables]]
name = "nation"
path = "benchmarks/tpch/data/sf1/nation.parquet"
format = "parquet"

[[tables]]
name = "region"
path = "benchmarks/tpch/data/sf1/region.parquet"
format = "parquet"
